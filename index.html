<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  /* =========================
   FULL APP STYLE MOBILE UI
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;

  background:#f1f5f9;
}

/* MAIN APP */
.container{
  width:100vw;
  height:100dvh;

  overflow:hidden;

  position:relative;

  background:
    linear-gradient(
      180deg,
      #eff6ff 0%,
      #ffffff 100%
    );
}

/* ALL PAGES */
.step{
  position:absolute;

  top:0;
  left:0;

  width:100%;
  height:100dvh;

  overflow-y:auto;

  display:none;

  padding:
    env(safe-area-inset-top)
    16px
    calc(20px + env(safe-area-inset-bottom));

  background:transparent;

  animation:page .35s ease;
}

/* ACTIVE PAGE */
.step.active{
  display:flex;
  flex-direction:column;
}

/* PAGE ANIMATION */
@keyframes page{
  from{
    opacity:0;
    transform:translateX(25px);
  }

  to{
    opacity:1;
    transform:translateX(0);
  }
}

/* STEP 1 CENTER */
#step1{
  display:flex;
  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;
}

/* REMOVE CARD LOOK */
.card{
  width:100%;
  height:100%;

  border-radius:0;
  box-shadow:none;
  border:none;

  background:transparent;

  padding:0;
}

/* TOP LOGO */
.logo{
  width:90px;
  margin:10px auto 30px;
}

/* FORM AREA */
.formWrap{
  width:100%;
  max-width:500px;
  margin:auto;
}

/* INPUT FIELD */
.field{
  position:relative;
  margin-bottom:18px;
}

.field input{
  width:100%;
  height:64px;

  border:none;
  outline:none;

  border-radius:18px;

  background:#fff;

  padding:
    24px
    16px
    8px;

  font-size:16px;

  box-shadow:
    0 2px 10px rgba(0,0,0,.05);

  transition:.2s;
}

/* INPUT FOCUS */
.field input:focus{
  transform:scale(1.01);

  box-shadow:
    0 0 0 2px #2563eb,
    0 10px 25px rgba(37,99,235,.15);
}

/* LABEL */
.field label{
  position:absolute;

  left:14px;
  top:22px;

  color:#94a3b8;

  font-size:15px;

  pointer-events:none;

  transition:.2s;
}

/* FLOAT LABEL */
.field input:focus + label,
.field input:not(:placeholder-shown) + label{

  top:8px;

  font-size:11px;

  color:#2563eb;

  font-weight:700;
}

/* APP BUTTON */
button{
  width:100%;
  height:60px;

  border:none;
  outline:none;

  border-radius:18px;

  margin-top:14px;

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #3b82f6
    );

  color:#fff;

  font-size:17px;
  font-weight:700;

  box-shadow:
    0 10px 25px rgba(37,99,235,.25);

  transition:.2s;
}

button:active{
  transform:scale(.98);
}

/* CAMERA */
.camera{
  width:82vw;
  height:82vw;

  max-width:320px;
  max-height:320px;

  border-radius:50%;

  overflow:hidden;

  margin:40px auto;

  border:6px solid #fff;

  box-shadow:
    0 0 0 10px rgba(37,99,235,.08),
    0 20px 40px rgba(37,99,235,.18);
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SIGN PAD */
#signPad{
  width:100%;
  height:240px;

  background:#fff;

  border-radius:20px;

  margin-top:20px;

  box-shadow:
    0 2px 12px rgba(0,0,0,.06);
}

/* SIGN GUIDE */
.signGuide{
  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  color:#cbd5e1;

  font-size:28px;
  font-weight:700;

  pointer-events:none;
}

/* ACTION BUTTONS */
.actionButtons{
  position:sticky;

  bottom:0;

  padding-top:18px;

  background:
    linear-gradient(
      to top,
      #ffffff 70%,
      transparent
    );
}

/* SUCCESS PAGE */
#step5{
  justify-content:center;
  align-items:center;

  text-align:center;
}

.tick{
  width:120px;
  height:120px;

  border-radius:50%;

  background:#22c55e;

  color:#fff;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:60px;
  font-weight:bold;

  margin:auto;

  box-shadow:
    0 20px 40px rgba(34,197,94,.25);
}

/* LOADER */
.spinner{
  width:60px;
  height:60px;

  border-radius:50%;

  border:5px solid #dbeafe;
  border-top:5px solid #2563eb;

  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

/* PROGRESS BAR */
.progressWrap{
  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:4px;

  background:#dbeafe;

  z-index:9999;
}

.progressBar{
  width:20%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      #2563eb,
      #60a5fa
    );

  transition:.3s;
}

/* SCROLLBAR HIDE */
.step::-webkit-scrollbar{
  display:none;
}

</style>
</head>

<body>

<div class="container">
  <div class="progressWrap">
  <div class="progressBar" id="progressBar"></div>
</div>

<!-- STEP 1 -->
<div id="step1">
  <div id="logoAnim" style="width:180px;height:180px"></div>
  <img src="https://www.z1tech.com/images/global/logo.svg" class="logo">
  <div id="typing"></div>
</div>

<!-- STEP 2 FORM -->
<div id="step2" class="step active">
  <div class="formWrap">

<img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">

<div class="field">
<input type="text" id="name" placeholder=" " required>
<label for="name">Your Name</label>
</div>
  
<div class="field">
<input type="text" id="meet" placeholder=" " required>
<label for="meet">Person to Meet</label>
</div>

<div class="field">
<input type="text" id="purpose" placeholder=" " required>
<label for="purpose">Purpose</label>
</div>

<div class="field">
<input type="text" id="mobile" placeholder=" " maxlength="10" inputmode="numeric" required>
<label for="mobile">Mobile</label>
</div>

<div class="field">
<input type="text" id="address" placeholder=" " required>
<label for="address">Address</label>
</div>


<button type="button" onclick="nextStep()">Next</button>

</div>
</div>


<!-- STEP 3 CAMERA -->
<div id="step3" class="step">
  
<div class="formWrap">
<div class="camera">
  <video id="cam" autoplay playsinline></video>
</div>

<button type="button" onclick="capture()">Capture Photo</button>

</div>
</div>

<!-- STEP 4 SIGN -->
<div id="step4" class="step">
<div class="formWrap">
<div class="signWrap">
  <div class="signGuide" id="signGuide">Sign Here</div>
  <canvas id="signPad"></canvas>
</div>
  
<div class="actionButtons">
<button type="button" onclick="clearSign()">Clear</button>
<button type="button" onclick="finalSubmit()">Submit</button>
</div>
  
</div>
</div>
<!-- STEP 5 -->
<div id="step5" class="step">
<div class="formWrap">
  <div id="loader">
    <div class="spinner"></div>
    <p>Submitting...</p>
  </div>

  <div id="success">
    <div class="tick">✓</div>
    <h2>Visitor Registered</h2>
    <h3>Thank you for visiting Z1Tech</h3>
  </div>

</div>

</div>
</div>
<script>

let stream;
let photoData="";

// 🔥 TYPING EFFECT
let text="Welcome to Z1Tech 🙏";
let i=0;

let typingEl = document.getElementById("typing");

function typing(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,80);
  } else {
    setTimeout(()=>{
      document.getElementById("step1").style.display="none"; // ADD THIS
      document.getElementById("step2").classList.add("active");
      setProgress(2);
    },1000);
  }
}
   lottie.loadAnimation({
  container:document.getElementById('logoAnim'),
  renderer:'svg',
  loop:true,
  autoplay:true,
  path:'https://assets1.lottiefiles.com/packages/lf20_jcikwtux.json'
});

typing();

 

// NEXT STEP
function nextStep(){

  let nameVal = document.getElementById("name").value.trim();
  let meetVal = document.getElementById("meet").value.trim();
  let purposeVal = document.getElementById("purpose").value.trim();
  let mobileVal = document.getElementById("mobile").value.trim();
  let addressVal = document.getElementById("address").value.trim();

  if(!nameVal || !meetVal || !purposeVal || !mobileVal || !addressVal){
    alert("⚠️ All fields required");
    return;
  }
    
  if(!/^[6-9]\d{9}$/.test(mobileVal)){
    alert("📱 Enter Valid 10 digit mobile number ");
    return;
  }
  
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");
  setProgress(3);
  startCamera(); 
}

// CAMERA START

function startCamera(){

  console.log("Camera start called");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(s=>{
    stream = s; // 🔥 MAIN FIX

    let video = document.getElementById("cam");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

    console.log("Camera working ✅");
  })
  .catch(err=>{
    console.error("Camera error:", err);
    alert("Camera blocked: " + err.message);
  });
}

function capture(){

  if(!stream){
    alert("📸 Start camera first");
    return;
  }

  let video = document.getElementById("cam");

  // Use actual video resolution
  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");

  // Draw without distortion
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Better quality (you can tweak 0.7–1.0)
  photoData = canvas.toDataURL("image/jpeg", 0.8);

  if(!photoData){
    alert("Photo failed");
    return;
  }

  // STOP CAMERA
  stream.getTracks().forEach(t => t.stop());

  // NEXT STEP (SIGNATURE)
 document.getElementById("step3").classList.remove("active");
document.getElementById("step4").classList.add("active");

  setTimeout(()=>{
  resizeCanvas();
},100);
  
  setProgress(4);
}
//  SAVE
function finalSubmit(){

  if(!photoData){
    alert("📸 Please capture photo first");
    return;
  }

  if(canvas.width === 0 || canvas.height === 0){
    alert("✍️ Signature pad not ready");
    return;
  }

  let signData = ctx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
  ).data;

  let blank = true;

  for(let i=3;i<signData.length;i+=4){

    if(signData[i] !== 0){
      blank = false;
      break;
    }
  }

  if(blank){
    alert("✍️ Signature is required");
    return;
  }

  // STEP CHANGE
  document.getElementById("step4").classList.remove("active");
  document.getElementById("step5").classList.add("active");

  document.getElementById("loader").style.display = "block";
  document.getElementById("success").style.display = "none";

  let url = "https://script.google.com/macros/s/AKfycbzyduPQRo4dyp6Q0lCrw-LIS0bNb6m2wZC_H1DxxxNkCvXyBwWY5RxZlcotWh9fYAdt/exec";

  fetch(url, {
  method: "POST",
  body: JSON.stringify({
  key: "Z1TECH123",
  type: "visitor",

  name: document.getElementById("name").value,
  meet: document.getElementById("meet").value,
  purpose: document.getElementById("purpose").value,
  mobile: document.getElementById("mobile").value,
  address: document.getElementById("address").value,

  inTime: "",
  outTime: "",
  totalTime: "",

  status: "IN",

  photo: photoData,
  sign: document.getElementById("signPad").toDataURL("image/png")
})
  })
  .then(res => res.text())
  .then(res => {

    document.getElementById("loader").style.display = "none";
    document.getElementById("success").style.display = "block";
    
    setProgress(5);
    
  confetti({
  particleCount:180,
  spread:90,
  origin:{y:0.6}
   });

    setTimeout(()=>location.reload(),3000);
  })
  .catch(err=>{
    alert("Save failed");
  });
}
  
  let canvas = document.getElementById("signPad");
  let ctx = canvas.getContext("2d");
  function resizeCanvas(){

  const ratio = Math.max(window.devicePixelRatio || 1,1);

  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  canvas.getContext("2d").scale(ratio,ratio);

  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
}

let drawing = false;
let hasSigned = false;

// Better stroke style
ctx.lineWidth = 2.5;
ctx.lineCap = "round";
ctx.lineJoin = "round";

// Get position helper
function getPosition(e) {
  let rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }
}

// START DRAW
function startDrawing(e) {
  document.getElementById('signGuide').style.display='none';
  e.preventDefault();
  drawing = true;

  let pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

// DRAW
function draw(e){

  if(!drawing) return;

  e.preventDefault();

  let pos = getPosition(e);

  ctx.lineTo(pos.x,pos.y);
  ctx.stroke();
}

// STOP DRAW
function stopDrawing(e) {
  drawing = false;
  ctx.beginPath();
}

// Touch events
canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDrawing);

// Mouse events (NEW)
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

// Clear signature
function clearSign() {
  document.getElementById('signGuide').style.display='block';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  hasSigned = false;
}
  function setProgress(step){

  let widths={
  1:'20%',
  2:'40%',
  3:'60%',
  4:'80%',
  5:'100%'
};

  document.getElementById('progressBar').style.width=widths[step];
}

</script>

</body>
</html>
