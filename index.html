<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f8fafc;
}

html, body{
  overflow-x:hidden;
}

/* CENTER BOX */
.container{
  width:100%;
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* STEP 1 CENTER */
#step1{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* STEP 2+ TOP LAYOUT */
.top{
  display:block;
  text-align:center;
}

/* LOGO */
.logo{
  width:90px;
  margin:10px auto;
  display:block;
}

/* TYPING TEXT */
#typing{
  font-size:22px;
  font-weight:bold;
  margin:20px 0;
  min-height:30px;
}

/* CARD */
.card{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  display:none;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  border:none;
  border-radius:30px;
  font-size:16px;
  margin-top:10px;
  letter-spacing:0.5px;
  font-weight:600;
}

button:hover{
  transform:scale(1.02);
  transition:0.2s;
}

/* CAMERA */
.camera{
  width:200px;
  height:200px;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
  
  .camera::after{
  content:"";
  position:absolute;
  width:140px;
  height:140px;
  border:2px dashed #fff;
  border-radius:50%;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* STEP HIDE */
.step{display:none;}
.active{display:block;}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #eee;
  border-top:4px solid #2563eb;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

.tick{
  font-size:60px;
  color:#22c55e;
  animation:pop 0.5s ease;
}

@keyframes pop{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}

canvas{
  touch-action: none;
}

#loader, #success{
  position:static;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:999;
}
  #step5{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:200px;
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1">
  <img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">
  <div id="typing"></div>
</div>

<!-- STEP 2 FORM -->
<div id="step2" class="card step top">

<img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">

<input id="name" placeholder="Your Name">
<input id="meet" placeholder="Person to Meet">
<input id="purpose" placeholder="Purpose">
<input id="mobile" placeholder="Mobile" maxlength="10" inputmode="numeric">
<input id="address" placeholder="Address">

<button onclick="nextStep()">Next</button>

</div>


<!-- STEP 3 CAMERA -->
<div id="step3" class="card step">

<div class="camera">
  <video id="cam" autoplay playsinline></video>
</div>

<button onclick="capture()">Capture Photo</button>

</div>

<!-- STEP 4 SIGN -->
<div id="step4" class="card step">

<canvas id="signPad" style="width:100%;height:150px;border:1px solid #ccc;border-radius:10px;"></canvas>

<button onclick="clearSign()">Clear</button>
<button onclick="finalSubmit()">Submit</button>

</div>

<!-- OUTSIDE STEP -->
<div id="step5" class="card step">
<div id="loader" style="display:none;text-align:center;margin-top:20px">
  <div class="spinner"></div>
  <p>Submitting...</p>
</div>

<div id="success" style="display:none;text-align:center;margin-top:20px">
  <div class="tick">✔</div>
  <h3>Thank you for visiting Z1Tech</h3>
</div>

</div>
</div>

<script>

let stream;
let photoData="";

// 🔥 TYPING EFFECT
let text="Welcome to Z1Tech";
let i=0;

let typingEl = document.getElementById("typing");

function typing(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,80);
  } else {
    setTimeout(()=>{
      document.getElementById("step1").style.display="none"; // ADD THIS
      document.getElementById("step2").classList.add("active");
    },1000);
  }
}

typing();

// NEXT STEP
function nextStep(){

  let nameVal = document.getElementById("name").value.trim();
  let meetVal = document.getElementById("meet").value.trim();
  let purposeVal = document.getElementById("purpose").value.trim();
  let mobileVal = document.getElementById("mobile").value.trim();
  let addressVal = document.getElementById("address").value.trim();

  if(!nameVal || !meetVal || !purposeVal || !mobileVal || !addressVal){
    alert("⚠️ All fields required");
    return;
  }
    
  if(!/^[6-9]\d{9}$/.test(mobileVal)){
    alert("📱 Enter Valid 10 digit mobile number ");
    return;
  }
  
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");

  startCamera(); 
}

// CAMERA START

function startCamera(){

  console.log("Camera start called");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(s=>{
    stream = s; // 🔥 MAIN FIX

    let video = document.getElementById("cam");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

    console.log("Camera working ✅");
  })
  .catch(err=>{
    console.error("Camera error:", err);
    alert("Camera blocked: " + err.message);
  });
}

function capture(){

  if(!stream){
    alert("📸 Start camera first");
    return;
  }

  let video = document.getElementById("cam");

  // Use actual video resolution
  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");

  // Draw without distortion
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Better quality (you can tweak 0.7–1.0)
  photoData = canvas.toDataURL("image/jpeg", 0.8);

  if(!photoData){
    alert("Photo failed");
    return;
  }

  // STOP CAMERA
  stream.getTracks().forEach(t => t.stop());

  // NEXT STEP (SIGNATURE)
 document.getElementById("step3").classList.remove("active");
document.getElementById("step4").classList.add("active");
}
//  SAVE
function finalSubmit(){

  if(!photoData){
    alert("📸 Please capture photo first");
    return;
  }

  if(!hasSigned){
    alert("✍️ Signature is required to proceed.");
    return;
  }

  // STEP CHANGE
  document.getElementById("step4").classList.remove("active");
  document.getElementById("step5").classList.add("active");

  document.getElementById("loader").style.display = "block";
  document.getElementById("success").style.display = "none";

  let url = "https://script.google.com/macros/s/AKfycbzyduPQRo4dyp6Q0lCrw-LIS0bNb6m2wZC_H1DxxxNkCvXyBwWY5RxZlcotWh9fYAdt/exec";

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      key: "Z1TECH123",
      type: "visitor",
      name: document.getElementById("name").value,
      meet: document.getElementById("meet").value,
      purpose: document.getElementById("purpose").value,
      mobile: document.getElementById("mobile").value,
      address: document.getElementById("address").value,
      photo: photoData,
      sign: document.getElementById("signPad").toDataURL("image/jpeg", 0.5)
    })
  })
  .then(res => res.text())
  .then(res => {

    document.getElementById("loader").style.display = "none";
    document.getElementById("success").style.display = "block";

    setTimeout(()=>location.reload(),3000);
  })
  .catch(err=>{
    alert("Save failed");
  });
}
  
let canvas = document.getElementById("signPad");
let ctx = canvas.getContext("2d");

let drawing = false;
let hasSigned = false;

// Better stroke style
ctx.lineWidth = 2.5;
ctx.lineCap = "round";
ctx.lineJoin = "round";

// Get position helper
function getPosition(e) {
  let rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }
}

// START DRAW
function startDrawing(e) {
  e.preventDefault();
  drawing = true;

  let pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

// DRAW
function draw(e) {
  if (!drawing) return;

  e.preventDefault();
  hasSigned = true;

  let pos = getPosition(e);

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

// STOP DRAW
function stopDrawing(e) {
  drawing = false;
  ctx.beginPath();
}

// Touch events
canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDrawing);

// Mouse events (NEW)
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

// Clear signature
function clearSign() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  hasSigned = false;
}

</script>

</body>
</html>
