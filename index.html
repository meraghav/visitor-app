<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
  body{
  margin:0;
  font-family:sans-serif;
  overflow-x:hidden;

  background:linear-gradient(-45deg,#f8fafc,#eef4ff,#f1f5f9,#e0ecff);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

html, body{
  width:100%;
  min-height:100%;
}

/* CONTAINER */
.container{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

 /* CARD */
.card{
  width:100%;
  max-width:430px;

  min-height:92dvh;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);

  border:1px solid rgba(255,255,255,0.5);

  background:rgba(255,255,255,0.95);

  backdrop-filter:blur(12px);

  padding:28px 20px 70px;

  box-sizing:border-box;

  border-radius:32px;

  margin:auto;

  transform:translateX(40px);
  opacity:0;

  transition:
    transform 0.45s ease,
    opacity 0.45s ease;
}

/* MOBILE */
@media(max-width:480px){

  .container{
    padding:12px;
    align-items:flex-start;
    justify-content:flex-start;
  }

    #step5{
    min-height:92dvh;
  }

  #signPad{
    height:180px;
  }

  .card{

    width:100%;
    max-width:100%;

    min-height:auto;

    border-radius:28px;

    padding:
      26px
      18px
      90px;

    margin:0;

    box-shadow:
      0 8px 25px rgba(0,0,0,0.08);
  }

}
  
#loader p{
  margin-top:18px;
  color:#374151;
  font-size:18px;
  font-weight:600;
}
/* STEP CENTER */
#step1{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.6s ease;
}

/* STEP 5 */
#step5{
  min-height:300px;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#step5.active{
  display:flex;
}
  #step4{
  flex-direction:column;
}

#step4 button:last-child{
  margin-top:14px;
}

/* ALL STEPS */
.step{
  display:none;
  opacity:0;
  transform:translateX(30px);
}

.step.active{
  display:block;
  opacity:1;
  transform:translateX(0);
  animation:slidePage .4s ease;
}

@keyframes slidePage{
  from{
    opacity:0;
    transform:translateX(30px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}
  
/* ACTIVE STEP */
.active{
  display:block;
  transform:translateX(0);
  opacity:1;
}

/* TOP SPACING */
.top{
  padding-top:10px;
}

/* LOGO */
.logo{
  width:85px;
  display:block;
  margin:10px auto 20px;
}
  .signWrap{
  position:relative;
}

.signGuide{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  color:#cbd5e1;
  font-size:28px;
  font-weight:700;
  pointer-events:none;
  transition:0.3s ease;
}

   /* SIGN PAD */
#signPad{
  width:100%;
  height:220px;

  border:1px solid #d1d5db;
  border-radius:14px;

  background:#fff;

  touch-action:none;

  display:block;

  margin-top:10px;
}

/* TYPING */
#typing{
  font-size:24px;
  font-weight:700;
  text-align:center;
  color:#111827;
}

/* LABEL LEFT */
label{
  display:block;
  text-align:left;
  margin-bottom:6px;
  margin-top:14px;
  font-size:14px;
  font-weight:600;
  color:#374151;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #d1d5db;
  font-size:16px;
  box-sizing:border-box;
  outline:none;
  transition:0.2s;
  background:#fff;
}

input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}

/* BUTTON */
button{
  width:100%;
  padding:16px;

  background:linear-gradient(135deg,#2563eb,#3b82f6);

  color:#fff;
  border:none;

  border-radius:40px;

  font-size:16px;
  font-weight:700;

  margin-top:38px;

  box-shadow:0 10px 25px rgba(37,99,235,0.25);

  transition:
    transform 0.12s ease,
    box-shadow 0.12s ease;
}

button:active{
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(37,99,235,0.2);
}

  .actionButtons{
  position:sticky;
  bottom:0;

  background:rgba(255,255,255,.9);

  padding-top:20px;

  backdrop-filter:blur(10px);
}
  
/* CAMERA */
.camera{
  width:78vw;
  height:78vw;
  max-width:290px;
  max-height:290px;
  border:4px solid rgba(255,255,255,0.5);
  border-radius:50%;
  overflow:hidden;
  margin:30px auto;
  position:relative;

  box-shadow:
    0 0 0 8px rgba(37,99,235,0.08),
    0 0 35px rgba(37,99,235,0.25);

  animation:pulseCam 2s infinite;
}

.camera::before{
  content:'';
  position:absolute;
  width:100%;
  height:4px;

  background:rgba(59,130,246,0.8);

  top:0;
  left:0;

  animation:scan 2.4s linear infinite;

  z-index:2;
}

.camera::after{
  content:'';
  position:absolute;
  inset:12%;
  border:2px dashed rgba(255,255,255,0.9);
  border-radius:50%;
}

@keyframes pulseCam{
  0%{transform:scale(1);}
  50%{transform:scale(1.02);}
  100%{transform:scale(1);}
}

@keyframes scan{
  0%{top:10%;}
  100%{top:85%;}
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOADER */
#loader{
  display:none;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

.spinner{
  width:55px;
  height:55px;
  border:5px solid #e5e7eb;
  border-top:5px solid #2563eb;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

/* SUCCESS */
#success{
  display:none;
  text-align:center;
  animation:popIn 0.5s ease;
}
  #success h2{
  margin-top:22px;
  font-size:28px;
  color:#111827;
}

#success h3{
  color:#6b7280;
  font-weight:500;
}

.tick{
  width:110px;
  height:110px;

  border-radius:50%;

  background:#22c55e;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#fff;
  font-size:56px;
  font-weight:bold;

  margin:auto;

  animation:tickPop 0.6s ease;

  box-shadow:0 10px 30px rgba(34,197,94,0.35);
}

@keyframes tickPop{
  0%{
    transform:scale(0);
  }

  60%{
    transform:scale(1.12);
  }

  100%{
    transform:scale(1);
  }
}

/* ANIMATIONS */
@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes popIn{
  from{
    transform:scale(0.7);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes bounce{
  0%{
    transform:scale(0);
  }
  60%{
    transform:scale(1.1);
  }
  100%{
    transform:scale(1);
  }
}

.field{
  position:relative;
  margin-top:18px;
}

.field input{
  width:100%;
  height:64px;

  background:#fff;

  border:none;

  box-shadow:inset 0 0 0 2px #d1d5db;

  border-radius:18px;

  padding:26px 16px 10px 16px;

  font-size:16px;
  font-weight:500;

  color:#111827;

  outline:none;

  box-sizing:border-box;

  transition:.2s ease;
}

.field input:focus{
  box-shadow:
    inset 0 0 0 2px #2563eb,
    0 0 0 3px rgba(37,99,235,.08);
}

.field label{
  position:absolute;

  left:16px;
  top:50%;

  transform:translateY(-50%);

  font-size:16px;
  font-weight:500;

  color:#94a3b8;

  background:#fff;

  padding:0 6px;

  line-height:1;

  pointer-events:none;

  transition:all .18s ease;

  z-index:2;
}

/* FLOAT LABEL */
.field input:focus + label,
.field input:not(:focus):valid + label{

  top:0;

  transform:translateY(-50%);

  font-size:12px;

  font-weight:700;

  color:#2563eb;

  box-shadow:0 0 0 4px #fff;
}
.progressWrap{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:5px;
  background:#dbeafe;
  z-index:9999;
}

.progressBar{
  width:25%;
  height:100%;
  background:linear-gradient(90deg,#2563eb,#60a5fa);
  transition:0.4s ease;
  border-radius:20px;
}

</style>
</head>

<body>

<div class="container">
  <div class="progressWrap">
  <div class="progressBar" id="progressBar"></div>
</div>

<!-- STEP 1 -->
<div id="step1">
  <div id="logoAnim" style="width:180px;height:180px"></div>
  <img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">
  <div id="typing"></div>
</div>

<!-- STEP 2 FORM -->
<div id="step2" class="card step top">

<img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">

<div class="field">
<input type="text" id="name" required>
<label for="name">Your Name</label>
</div>
  
<div class="field">
<input type="text" id="meet" required>
<label for="meet">Person to Meet</label>
</div>

<div class="field">
<input type="text" id="purpose" required>
<label for="purpose">Purpose</label>
</div>

<div class="field">
<input type="text" id="mobile" maxlength="10" inputmode="numeric" required>
<label for="mobile">Mobile</label>
</div>

<div class="field">
<input type="text" id="address" required>
<label for="address">Address</label>
</div>

<button onclick="nextStep()">Next</button>

</div>


<!-- STEP 3 CAMERA -->
<div id="step3" class="card step">

<div class="camera">
  <video id="cam" autoplay playsinline></video>
</div>

<button onclick="capture()">Capture Photo</button>

</div>

<!-- STEP 4 SIGN -->
<div id="step4" class="card step">

<div class="signWrap">
  <div class="signGuide" id="signGuide">Sign Here</div>
  <canvas id="signPad"></canvas>
</div>
  
<div class="actionButtons">
<button onclick="clearSign()">Clear</button>
<button onclick="finalSubmit()">Submit</button>
</div>
  
</div>

<!-- STEP 5 -->
<div id="step5" class="card step">

  <div id="loader">
    <div class="spinner"></div>
    <p>Submitting...</p>
  </div>

  <div id="success">
    <div class="tick">✓</div>
    <h2>Visitor Registered</h2>
    <h3>Thank you for visiting Z1Tech</h3>
  </div>

</div>

</div>

<script>

let stream;
let photoData="";

// 🔥 TYPING EFFECT
let text="Welcome to Z1Tech 🙏";
let i=0;

let typingEl = document.getElementById("typing");

function typing(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,80);
  } else {
    setTimeout(()=>{
      document.getElementById("step1").style.display="none"; // ADD THIS
      document.getElementById("step2").classList.add("active");
      setProgress(2);
    },1000);
  }
}
   lottie.loadAnimation({
  container:document.getElementById('logoAnim'),
  renderer:'svg',
  loop:true,
  autoplay:true,
  path:'https://assets1.lottiefiles.com/packages/lf20_jcikwtux.json'
});

typing();

 

// NEXT STEP
function nextStep(){

  let nameVal = document.getElementById("name").value.trim();
  let meetVal = document.getElementById("meet").value.trim();
  let purposeVal = document.getElementById("purpose").value.trim();
  let mobileVal = document.getElementById("mobile").value.trim();
  let addressVal = document.getElementById("address").value.trim();

  if(!nameVal || !meetVal || !purposeVal || !mobileVal || !addressVal){
    alert("⚠️ All fields required");
    return;
  }
    
  if(!/^[6-9]\d{9}$/.test(mobileVal)){
    alert("📱 Enter Valid 10 digit mobile number ");
    return;
  }
  
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");
  setProgress(3);
  startCamera(); 
}

// CAMERA START

function startCamera(){

  console.log("Camera start called");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(s=>{
    stream = s; // 🔥 MAIN FIX

    let video = document.getElementById("cam");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

    console.log("Camera working ✅");
  })
  .catch(err=>{
    console.error("Camera error:", err);
    alert("Camera blocked: " + err.message);
  });
}

function capture(){

  if(!stream){
    alert("📸 Start camera first");
    return;
  }

  let video = document.getElementById("cam");

  // Use actual video resolution
  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");

  // Draw without distortion
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Better quality (you can tweak 0.7–1.0)
  photoData = canvas.toDataURL("image/jpeg", 0.8);

  if(!photoData){
    alert("Photo failed");
    return;
  }

  // STOP CAMERA
  stream.getTracks().forEach(t => t.stop());

  // NEXT STEP (SIGNATURE)
 document.getElementById("step3").classList.remove("active");
document.getElementById("step4").classList.add("active");

  setTimeout(()=>{
  resizeCanvas();
},100);
  
  setProgress(4);
}
//  SAVE
function finalSubmit(){

  if(!photoData){
    alert("📸 Please capture photo first");
    return;
  }

  if(canvas.width === 0 || canvas.height === 0){
    alert("✍️ Signature pad not ready");
    return;
  }

  let signData = ctx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
  ).data;

  let blank = true;

  for(let i=3;i<signData.length;i+=4){

    if(signData[i] !== 0){
      blank = false;
      break;
    }
  }

  if(blank){
    alert("✍️ Signature is required");
    return;
  }

  // STEP CHANGE
  document.getElementById("step4").classList.remove("active");
  document.getElementById("step5").classList.add("active");

  document.getElementById("loader").style.display = "block";
  document.getElementById("success").style.display = "none";

  let url = "https://script.google.com/macros/s/AKfycbzyduPQRo4dyp6Q0lCrw-LIS0bNb6m2wZC_H1DxxxNkCvXyBwWY5RxZlcotWh9fYAdt/exec";

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      key: "Z1TECH123",
      type: "visitor",
      name: document.getElementById("name").value,
      meet: document.getElementById("meet").value,
      purpose: document.getElementById("purpose").value,
      mobile: document.getElementById("mobile").value,
      address: document.getElementById("address").value,
      photo: photoData,
      sign: document.getElementById("signPad").toDataURL("image/jpeg", 0.5)
    })
  })
  .then(res => res.text())
  .then(res => {

    document.getElementById("loader").style.display = "none";
    document.getElementById("success").style.display = "block";
    
    setProgress(5);
    
  confetti({
  particleCount:180,
  spread:90,
  origin:{y:0.6}
   });

    setTimeout(()=>location.reload(),3000);
  })
  .catch(err=>{
    alert("Save failed");
  });
}
  
  let canvas = document.getElementById("signPad");
  let ctx = canvas.getContext("2d");
  function resizeCanvas(){

  const ratio = Math.max(window.devicePixelRatio || 1,1);

  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  canvas.getContext("2d").scale(ratio,ratio);

  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
}

let drawing = false;
let hasSigned = false;

// Better stroke style
ctx.lineWidth = 2.5;
ctx.lineCap = "round";
ctx.lineJoin = "round";

// Get position helper
function getPosition(e) {
  let rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }
}

// START DRAW
function startDrawing(e) {
  document.getElementById('signGuide').style.display='none';
  e.preventDefault();
  drawing = true;

  let pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

// DRAW
function draw(e){

  if(!drawing) return;

  e.preventDefault();

  let pos = getPosition(e);

  ctx.lineTo(pos.x,pos.y);
  ctx.stroke();
}

// STOP DRAW
function stopDrawing(e) {
  drawing = false;
  ctx.beginPath();
}

// Touch events
canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDrawing);

// Mouse events (NEW)
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

// Clear signature
function clearSign() {
  document.getElementById('signGuide').style.display='block';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  hasSigned = false;
}
  function setProgress(step){

  let widths={
  1:'20%',
  2:'40%',
  3:'60%',
  4:'80%',
  5:'100%'
};

  document.getElementById('progressBar').style.width=widths[step];
}

</script>

</body>
</html>
