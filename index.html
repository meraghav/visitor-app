<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f8fafc;
}

html, body{
  overflow-x:hidden;
}

/* CENTER BOX */
.container{
  width:100%;
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* STEP 1 CENTER */
#step1{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* STEP 2+ TOP LAYOUT */
.top{
  display:block;
  text-align:center;
}

/* LOGO */
.logo{
  width:90px;
  margin:10px auto;
  display:block;
}

/* TYPING TEXT */
#typing{
  font-size:22px;
  font-weight:bold;
  margin:20px 0;
  min-height:30px;
}

/* CARD */
.card{
  margin-top:20px;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  display:none;
}

/* INPUT */
input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  border:none;
  border-radius:30px;
  font-size:16px;
  margin-top:10px;
  letter-spacing:0.5px;
  font-weight:600;
}

button:hover{
  transform:scale(1.02);
  transition:0.2s;
}

/* CAMERA */
.camera{
  width:200px;
  height:200px;
  border-radius:50%;
  overflow:hidden;
  margin:15px auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* STEP HIDE */
.step{display:none;}
.active{display:block;}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #eee;
  border-top:4px solid #2563eb;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

.tick{
  font-size:60px;
  color:#22c55e;
  animation:pop 0.5s ease;
}

@keyframes pop{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}

canvas{
  touch-action: none;
}

#loader, #success{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:999;
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1">
  <img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">
  <div id="typing"></div>
</div>

<!-- STEP 2 FORM -->
<div id="step2" class="card step top">

<img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">

<input id="name" placeholder="Your Name">
<input id="meet" placeholder="Person to Meet">
<input id="purpose" placeholder="Purpose">
<input id="mobile" placeholder="Mobile">
<input id="address" placeholder="Address">

<button onclick="nextStep()">Next</button>

</div>


<!-- STEP 3 CAMERA -->
<div id="step3" class="card step">

<div class="camera">
  <video id="cam" autoplay playsinline></video>
</div>

<button onclick="capture()">Capture Photo</button>

</div>

<!-- STEP 4 SIGN -->
<div id="step4" class="card step">

<canvas id="signPad" style="width:100%;height:150px;border:1px solid #ccc;border-radius:10px;"></canvas>

<button onclick="clearSign()">Clear</button>
<button onclick="finalSubmit()">Submit</button>

</div>

<!-- OUTSIDE STEP -->
<div id="loader" style="display:none;text-align:center;margin-top:20px">
  <div class="spinner"></div>
  <p>Submitting...</p>
</div>

<div id="success" style="display:none;text-align:center;margin-top:20px">
  <div class="tick">✔</div>
  <h3>Entry Successful</h3>
</div>

</div>

<script>

let stream;
let photoData="";

// 🔥 TYPING EFFECT
let text="Welcome to Z1Tech";
let i=0;

let typingEl = document.getElementById("typing");

function typing(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,80);
  } else {
    setTimeout(()=>{
      document.getElementById("step1").style.display="none"; // ADD THIS
      document.getElementById("step2").classList.add("active");
    },1000);
  }
}

typing();

// NEXT STEP
function nextStep(){

  let nameVal = document.getElementById("name").value.trim();
  let meetVal = document.getElementById("meet").value.trim();
  let purposeVal = document.getElementById("purpose").value.trim();
  let mobileVal = document.getElementById("mobile").value.trim();
  let addressVal = document.getElementById("address").value.trim();

  if(!nameVal || !meetVal || !purposeVal || !mobileVal || !addressVal){
    alert("⚠️ All fields required");
    return;
  }

  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");

  startCamera(); // 🔥 YE MISSING THA
}

// CAMERA START (FIXED)

function startCamera(){

  console.log("Camera start called");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(s=>{
    stream = s; // 🔥 MAIN FIX

    let video = document.getElementById("cam");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

    console.log("Camera working ✅");
  })
  .catch(err=>{
    console.error("Camera error:", err);
    alert("Camera blocked: " + err.message);
  });
}

function capture(){

   if(!stream){
    alert("📸 Start camera first");
    return;
  }

  let video = document.getElementById("cam");

  let canvas=document.createElement("canvas");
  canvas.width=200;
  canvas.height=200;

  let ctx=canvas.getContext("2d");
  ctx.drawImage(video,0,0,200,200);

  photoData = canvas.toDataURL(); // FIX

  // STOP CAMERA
   if(!photoData){
    alert("Photo failed");
    return;
  }

  stream.getTracks().forEach(t=>t.stop());

  // NEXT STEP (SIGNATURE)
  step3.classList.remove("active");
  step4.classList.add("active");
}

//  SAVE
function finalSubmit(){

  if(!photoData){
    alert("📸 Please capture photo first");
    return;
  }

  let signData = document.getElementById("signPad").toDataURL();

  if(signData.length < 1000){
    alert("✍️ Signature Do");
    return;
  }

  loader.style.display="block";

  let url = "https://script.google.com/macros/s/AKfycbzyduPQRo4dyp6Q0lCrw-LIS0bNb6m2wZC_H1DxxxNkCvXyBwWY5RxZlcotWh9fYAdt/exec";

  let params = new URLSearchParams({
    key: "Z1TECH123",
    type: "visitor",

    name: name.value,
    meet: meet.value,
    purpose: purpose.value,
    mobile: mobile.value,
    address: address.value,
    photo: photoData,
    sign: signData
  });

  fetch(url + "?" + params.toString())
  .then(res => res.text())
  .then(res => {
    console.log(res);

    loader.style.display="none";
    success.style.display="block";

    setTimeout(()=>location.reload(),2000);
  })
  .catch(err=>{
    console.error(err);
    alert("Save failed");
  });
}
  
let canvas = document.getElementById("signPad");
let ctx = canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("touchstart", e=>{
  drawing=true;
});

canvas.addEventListener("touchend", e=>{
  drawing=false;
});

canvas.addEventListener("touchmove", e=>{
  if(!drawing) return;

  let rect = canvas.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  ctx.lineWidth=2;
  ctx.lineCap="round";

  ctx.lineTo(x,y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x,y);
});

function clearSign(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

</script>

</body>
</html>
