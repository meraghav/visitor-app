<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f8fafc;
  overflow-x:hidden;
}

html, body{
  width:100%;
  min-height:100%;
}

/* CONTAINER */
.container{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  box-sizing:border-box;
}

/* CARD */
.card{
  width:100%;
  max-width:430px;   /* width kam */
  min-height:650px;  /* mobile height badi */
  
  background:white;
  padding:28px 22px;
  border-radius:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  
  box-sizing:border-box;
  margin:auto;

  animation:slideUp 0.4s ease;
}

/* MOBILE */
@media(max-width:480px){

  .container{
    padding:14px;
    align-items:flex-start;
  }

  .card{
    max-width:100%;
    min-height:92vh;   /* almost full mobile screen */
    border-radius:24px;
    padding:24px 18px;
  }

}

/* STEP CENTER */
#step1{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.6s ease;
}

/* ACTIVE STEP */
.active{
  display:block;
}

/* TOP SPACING */
.top{
  padding-top:10px;
}

/* LOGO */
.logo{
  width:85px;
  display:block;
  margin:10px auto 20px;
}

/* TYPING */
#typing{
  font-size:24px;
  font-weight:700;
  text-align:center;
  color:#111827;
}

/* LABEL LEFT */
label{
  display:block;
  text-align:left;
  margin-bottom:6px;
  margin-top:14px;
  font-size:14px;
  font-weight:600;
  color:#374151;
}

/* INPUT */
input{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #d1d5db;
  font-size:16px;
  box-sizing:border-box;
  outline:none;
  transition:0.2s;
  background:#fff;
}

input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  border:none;
  border-radius:40px;
  font-size:16px;
  margin-top:18px;
  font-weight:700;
  letter-spacing:0.3px;
  transition:0.2s;
}

button:active{
  transform:scale(0.98);
}

/* CAMERA */
.camera{
  width:75vw;
  height:75vw;
  max-width:260px;
  max-height:260px;
  border-radius:50%;
  overflow:hidden;
  margin:20px auto;
  position:relative;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.camera::after{
  content:"";
  position:absolute;
  width:65%;
  height:65%;
  border:2px dashed #fff;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SIGN PAD */
#signPad{
  width:100%;
  height:160px;
  border:1px solid #d1d5db;
  border-radius:14px;
  background:#fff;
}

/* STEP 5 */
#step5{
  min-height:300px;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#step5.active{
  display:flex;
}

/* LOADER */
#loader{
  display:none;
  text-align:center;
  animation:fadeIn 0.3s ease;
}

.spinner{
  width:55px;
  height:55px;
  border:5px solid #e5e7eb;
  border-top:5px solid #2563eb;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

/* SUCCESS */
#success{
  display:none;
  text-align:center;
  animation:popIn 0.5s ease;
}

.tick{
  width:90px;
  height:90px;
  background:#22c55e;
  border-radius:50%;
  color:white;
  font-size:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
  animation:bounce 0.6s ease;
}

/* ANIMATIONS */
@keyframes spin{
  100%{
    transform:rotate(360deg);
  }
}

@keyframes fadeIn{
  from{
    opacity:0;
  }
  to{
    opacity:1;
  }
}

@keyframes slideUp{
  from{
    opacity:0;
    transform:translateY(20px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes popIn{
  from{
    transform:scale(0.7);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

@keyframes bounce{
  0%{
    transform:scale(0);
  }
  60%{
    transform:scale(1.1);
  }
  100%{
    transform:scale(1);
  }
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1">
  <img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">
  <div id="typing"></div>
</div>

<!-- STEP 2 FORM -->
<div id="step2" class="card step top">

<img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">

<label for="name">Your Name</label>
<input id="name" placeholder="Your Name">

<label for="meet">Person to Meet</label>
<input id="meet" placeholder="Person to Meet">

<label for="purpose">Purpose</label>
<input id="purpose" placeholder="Purpose">

<label for="mobile">Mobile</label>
<input id="mobile" placeholder="Mobile" maxlength="10" inputmode="numeric">

<label for="address">Address</label>
<input id="address" placeholder="Address">

<button onclick="nextStep()">Next</button>

</div>


<!-- STEP 3 CAMERA -->
<div id="step3" class="card step">

<div class="camera">
  <video id="cam" autoplay playsinline></video>
</div>

<button onclick="capture()">Capture Photo</button>

</div>

<!-- STEP 4 SIGN -->
<div id="step4" class="card step">

<canvas id="signPad" style="width:100%;height:150px;border:1px solid #ccc;border-radius:10px;"></canvas>

<button onclick="clearSign()">Clear</button>
<button onclick="finalSubmit()">Submit</button>

</div>

<!-- STEP 5 -->
<div id="step5" class="card step">

  <div id="loader">
    <div class="spinner"></div>
    <p>Submitting...</p>
  </div>

  <div id="success">
    <div class="tick">✓</div>
    <h3>Thank you for visiting Z1Tech</h3>
  </div>

</div>

</div>
</div>

<script>

let stream;
let photoData="";

// 🔥 TYPING EFFECT
let text="Welcome to Z1Tech";
let i=0;

let typingEl = document.getElementById("typing");

function typing(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,80);
  } else {
    setTimeout(()=>{
      document.getElementById("step1").style.display="none"; // ADD THIS
      document.getElementById("step2").classList.add("active");
    },1000);
  }
}

typing();

// NEXT STEP
function nextStep(){

  let nameVal = document.getElementById("name").value.trim();
  let meetVal = document.getElementById("meet").value.trim();
  let purposeVal = document.getElementById("purpose").value.trim();
  let mobileVal = document.getElementById("mobile").value.trim();
  let addressVal = document.getElementById("address").value.trim();

  if(!nameVal || !meetVal || !purposeVal || !mobileVal || !addressVal){
    alert("⚠️ All fields required");
    return;
  }
    
  if(!/^[6-9]\d{9}$/.test(mobileVal)){
    alert("📱 Enter Valid 10 digit mobile number ");
    return;
  }
  
  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");

  startCamera(); 
}

// CAMERA START

function startCamera(){

  console.log("Camera start called");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(s=>{
    stream = s; // 🔥 MAIN FIX

    let video = document.getElementById("cam");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

    console.log("Camera working ✅");
  })
  .catch(err=>{
    console.error("Camera error:", err);
    alert("Camera blocked: " + err.message);
  });
}

function capture(){

  if(!stream){
    alert("📸 Start camera first");
    return;
  }

  let video = document.getElementById("cam");

  // Use actual video resolution
  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");

  // Draw without distortion
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Better quality (you can tweak 0.7–1.0)
  photoData = canvas.toDataURL("image/jpeg", 0.8);

  if(!photoData){
    alert("Photo failed");
    return;
  }

  // STOP CAMERA
  stream.getTracks().forEach(t => t.stop());

  // NEXT STEP (SIGNATURE)
 document.getElementById("step3").classList.remove("active");
document.getElementById("step4").classList.add("active");
}
//  SAVE
function finalSubmit(){

  if(!photoData){
    alert("📸 Please capture photo first");
    return;
  }

  if(!hasSigned){
    alert("✍️ Signature is required to proceed.");
    return;
  }

  // STEP CHANGE
  document.getElementById("step4").classList.remove("active");
  document.getElementById("step5").classList.add("active");

  document.getElementById("loader").style.display = "block";
  document.getElementById("success").style.display = "none";

  let url = "https://script.google.com/macros/s/AKfycbzyduPQRo4dyp6Q0lCrw-LIS0bNb6m2wZC_H1DxxxNkCvXyBwWY5RxZlcotWh9fYAdt/exec";

  fetch(url, {
    method: "POST",
    body: JSON.stringify({
      key: "Z1TECH123",
      type: "visitor",
      name: document.getElementById("name").value,
      meet: document.getElementById("meet").value,
      purpose: document.getElementById("purpose").value,
      mobile: document.getElementById("mobile").value,
      address: document.getElementById("address").value,
      photo: photoData,
      sign: document.getElementById("signPad").toDataURL("image/jpeg", 0.5)
    })
  })
  .then(res => res.text())
  .then(res => {

    document.getElementById("loader").style.display = "none";
    document.getElementById("success").style.display = "block";

    setTimeout(()=>location.reload(),3000);
  })
  .catch(err=>{
    alert("Save failed");
  });
}
  
let canvas = document.getElementById("signPad");
let ctx = canvas.getContext("2d");

let drawing = false;
let hasSigned = false;

// Better stroke style
ctx.lineWidth = 2.5;
ctx.lineCap = "round";
ctx.lineJoin = "round";

// Get position helper
function getPosition(e) {
  let rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }
}

// START DRAW
function startDrawing(e) {
  e.preventDefault();
  drawing = true;

  let pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

// DRAW
function draw(e) {
  if (!drawing) return;

  e.preventDefault();
  hasSigned = true;

  let pos = getPosition(e);

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

// STOP DRAW
function stopDrawing(e) {
  drawing = false;
  ctx.beginPath();
}

// Touch events
canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDrawing);

// Mouse events (NEW)
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

// Clear signature
function clearSign() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  hasSigned = false;
}

  function resizeCanvas(){
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

</script>

</body>
</html>
