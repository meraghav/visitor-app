<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
  *{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
   max-width:100%;
   box-sizing:border-box;
}

 img, video, canvas {
  max-width:100%;
  display:block;
}
  
body{
  margin:0;
  font-family:sans-serif;
  background:#f8fafc;
  overscroll-behavior-x: none;
}

html, body {
  margin:0;
  padding:0;
  overflow-x:hidden;
}

 .app{
  position:fixed;
  inset:0;             
  width:100%;
  max-width:420px;
  margin:auto;
  overflow:hidden;      
  background:#f8fafc;
  display:flex;
  flex-direction:column;
}

/* CENTER BOX */
.container{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:15px;
}

/* STEP 1 CENTER */
#step1{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* STEP 2+ TOP LAYOUT */
.top{
  display:block;
  text-align:center;
}

/* LOGO */
.logo{
  width:80px;
  margin:10px auto;
  display:block;
}

/* TYPING TEXT */
#typing{
  font-size:20px;
  font-weight:bold;
  margin:15px 0;
  text-align:center;
}

/* CARD */
.card{
  margin-top:15px;
  background:white;
  padding:18px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  display:none;
}

/* INPUT */
input{
  width:100%;
  padding:16px;
  margin:10px 0;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,#2563eb,#3b82f6);
  color:white;
  border:none;
  border-radius:30px;
  font-size:16px;
  margin-top:10px;
  letter-spacing:0.5px;
  font-weight:600;
}

button:hover{
  transform:scale(1.02);
  transition:0.2s;
}
  
@media (hover:hover){
  button:hover{
    transform:scale(1.02);
  }
}
  

/* CAMERA */
.camera{
  width:160px;
  height:160px;
  border-radius:50%;
  overflow:hidden;
  margin:15px auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* STEP HIDE */
.step{display:none;}
.active{display:block;}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #eee;
  border-top:4px solid #2563eb;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin{
  100%{transform:rotate(360deg)}
}

.tick{
  font-size:60px;
  color:#22c55e;
  animation:pop 0.5s ease;
}

@keyframes pop{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}

canvas{
  display:block;
  width:100%;
  max-width:100%;
  height:150px;
  border:1px solid #ccc;
  border-radius:10px;
  touch-action:none;
}

#loader, #success{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:999;
  width:90%;
  max-width:300px;
}

@media (max-width:380px){
  .container{
    padding:10px;
  }

  input, button{
    font-size:15px;
    padding:14px;
  }

  .camera{
    width:140px;
    height:140px;
  }
}
</style>
</head>

<body>
<div class="app">
<div class="container">

<!-- STEP 1 -->
<div id="step1">
  <img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">
  <div id="typing"></div>
</div>

<!-- STEP 2 FORM -->
<div id="step2" class="card step top">

<img src="https://i.ibb.co/DHg5tCWx/images-1.png" class="logo">

<input id="name" placeholder="Your Name">
<input id="meet" placeholder="Person to Meet">
<input id="purpose" placeholder="Purpose">
<input id="mobile" placeholder="Mobile">
<input id="address" placeholder="Address">

<button onclick="nextStep()">Next</button>

</div>


<!-- STEP 3 CAMERA -->
<div id="step3" class="card step">

<div class="camera">
  <video id="cam" autoplay playsinline></video>
</div>

<button onclick="capture()">Capture Photo</button>

</div>

<!-- STEP 4 SIGN -->
<div id="step4" class="card step">

<canvas id="signPad" style="width:100%;height:150px;border:1px solid #ccc;border-radius:10px;"></canvas>

<button onclick="clearSign()">Clear</button>
<button onclick="finalSubmit()">Submit</button>

</div>

<!-- OUTSIDE STEP -->
<div id="loader" style="display:none;text-align:center;margin-top:20px">
  <div class="spinner"></div>
  <p>Submitting...</p>
</div>

<div id="success" style="display:none;text-align:center;margin-top:20px">
  <div class="tick">✔</div>
  <h3>Entry Successful</h3>
</div>

</div>
 </div>

<script>

let stream;
let photoData="";

// 🔥 TYPING EFFECT
let text="Welcome to Z1Tech";
let i=0;

let typingEl = document.getElementById("typing");

function typing(){
  if(i < text.length){
    typingEl.innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,80);
  } else {
    setTimeout(()=>{
      document.getElementById("step1").style.display="none"; // ADD THIS
      document.getElementById("step2").classList.add("active");
    },1000);
  }
}

typing();

// NEXT STEP
function nextStep(){

  let nameVal = document.getElementById("name").value.trim();
  let meetVal = document.getElementById("meet").value.trim();
  let purposeVal = document.getElementById("purpose").value.trim();
  let mobileVal = document.getElementById("mobile").value.trim();
  let addressVal = document.getElementById("address").value.trim();

  if(!nameVal || !meetVal || !purposeVal || !mobileVal || !addressVal){
    alert("⚠️ All fields required");
    return;
  }

  document.getElementById("step2").classList.remove("active");
  document.getElementById("step3").classList.add("active");

  startCamera(); // 🔥 YE MISSING THA
}

// CAMERA START (FIXED)

function startCamera(){

  console.log("Camera start called");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "user" },
    audio: false
  })
  .then(s=>{
    stream = s; // 🔥 MAIN FIX

    let video = document.getElementById("cam");
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

    console.log("Camera working ✅");
  })
  .catch(err=>{
    console.error("Camera error:", err);
    alert("Camera blocked: " + err.message);
  });
}

function capture(){

  if(!stream){
    alert("📸 Start camera first");
    return;
  }

  let video = document.getElementById("cam");

  // Use actual video resolution
  let canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");

  // Draw without distortion
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Better quality (you can tweak 0.7–1.0)
  photoData = canvas.toDataURL("image/jpeg", 0.8);

  if(!photoData){
    alert("Photo failed");
    return;
  }

  // STOP CAMERA
  stream.getTracks().forEach(t => t.stop());

  // NEXT STEP (SIGNATURE)
  step3.classList.remove("active");
  step4.classList.add("active");
}
//  SAVE
function finalSubmit(){

  if(!photoData){
    alert("📸 Please capture photo first");
    return;
  }

 let signData = document.getElementById("signPad")
  .toDataURL("image/jpeg", 0.5);

  if(signData.length < 1000){
    alert("✍️ Signature Do");
    return;
  }

  loader.style.display="block";

  let url = "https://script.google.com/macros/s/AKfycbzyduPQRo4dyp6Q0lCrw-LIS0bNb6m2wZC_H1DxxxNkCvXyBwWY5RxZlcotWh9fYAdt/exec";

fetch(url, {
  method: "POST",
  body: JSON.stringify({
    key: "Z1TECH123",
    type: "visitor",

  name: document.getElementById("name").value,
  meet: document.getElementById("meet").value,
  purpose: document.getElementById("purpose").value,
  mobile: document.getElementById("mobile").value,
  address: document.getElementById("address").value,
  photo: photoData,
  sign: signData
  })
})
.then(res => res.text())
.then(res => {
  console.log(res);

  loader.style.display="none";
  success.style.display="block";

  setTimeout(()=>location.reload(),2000);
})
.catch(err=>{
  console.error(err);
  alert("Save failed");
});
}
  
let canvas = document.getElementById("signPad");
let ctx = canvas.getContext("2d");

let drawing = false;
let hasSigned = false;

// Better stroke style
ctx.lineWidth = 2.5;
ctx.lineCap = "round";
ctx.lineJoin = "round";

// Get position helper
function getPosition(e) {
  let rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  } else {
    return {
      x: e.clientX - rect.left,
      y: e.clientY - rect.top
    };
  }
}

// START DRAW
function startDrawing(e) {
  e.preventDefault();
  drawing = true;

  let pos = getPosition(e);
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

// DRAW
function draw(e) {
  if (!drawing) return;

  e.preventDefault();
  hasSigned = true;

  let pos = getPosition(e);

  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

// STOP DRAW
function stopDrawing(e) {
  drawing = false;
  ctx.beginPath();
}

// Touch events
canvas.addEventListener("touchstart", startDrawing);
canvas.addEventListener("touchmove", draw);
canvas.addEventListener("touchend", stopDrawing);

// Mouse events (NEW)
canvas.addEventListener("mousedown", startDrawing);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDrawing);
canvas.addEventListener("mouseleave", stopDrawing);

// Clear signature
function clearSign() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
  hasSigned = false;
}
function resizeCanvas() {
  let ratio = window.devicePixelRatio || 1;
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.scale(ratio, ratio);
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
